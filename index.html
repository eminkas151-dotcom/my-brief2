<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>My Brief</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <div class="brand">MY BRIEF</div>
        <h1 id="greeting">Добрый день</h1>
        <div class="muted" id="dateLine"></div>
        <div class="updated" id="updatedLine">Последнее обновление: —</div>
      </div>
      <button class="iconButton" onclick="testNotify()" aria-label="Проверить уведомления">🔔</button>
    </header>

    <section class="card important">
      <h2>⭐ Главное сегодня</h2>
      <div id="topStories" class="newsList"></div>
    </section>

    <nav class="card quick" id="quick" aria-label="Разделы"></nav>

    <div id="sections"></div>
  </main>

  <nav class="bottom" aria-label="Нижнее меню">
    <a href="#top"><b>🏠</b><span>Главная</span></a>
    <a href="#az"><b>🇦🇿</b><span>Азербайджан</span></a>
    <a href="#ru"><b>🇷🇺</b><span>Россия</span></a>
    <a href="#world"><b>🌍</b><span>Мир</span></a>
    <a href="#ai"><b>🤖</b><span>AI</span></a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
